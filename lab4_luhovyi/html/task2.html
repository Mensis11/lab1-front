<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Завдання 2</title>
        <style>
            .block1 {
                margin-left: 0;
            }

            .block2 {
                margin-left: 60px;
            }

            .block3 {
                margin-left: 120px;
            }

            .block1 p {
                color: red;
                background-color: lightyellow;
                border: 2px solid black;
                text-indent: 20px;
            }

            .block2 p {
                color: blue;
                background-color: lightgreen;
                border: 2px dashed purple;
                text-indent: 30px;
            }

            .block3 p {
                color: darkgreen;
                background-color: lightblue;
                border: 2px dotted red;
                text-indent: 40px;
            }
        </style>
    </head>
    <body>
        <div class="block1">
            <p>Це перший абзац тексту. Він має власний колір тексту, фону та рамку.</p>
        </div>

        <div class="block2">
            <p>Це другий абзац тексту. Він зміщений вправо на 60px відносно першого.</p>
        </div>

        <div class="block3">
            <p>Це третій абзац тексту. Він зміщений ще на 60px вправо від другого.</p>
        </div>
    </body>
</html>
